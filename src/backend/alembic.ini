# Alembic配置文件
# 数据资产管理平台 - 数据库迁移配置

[alembic]
# 迁移脚本目录
script_location = migrations

# 模板文件
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# 时区设置
timezone = Asia/Shanghai

# 是否截断长标识符
truncate_slug_length = 40

# 版本表名
version_table = alembic_version

# 版本表schema
version_table_schema = public

# 是否在迁移脚本中添加版本路径
prepend_sys_path = .

# 数据库URL（从环境变量读取，或使用默认值）
# 实际使用时应通过环境变量DATABASE_URL设置
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/data_asset_platform

[post_write_hooks]
# 代码格式化钩子（可选）
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

# Logging配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
