spring:
  config:
    activate:
      on-profile: docker

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/data_asset?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:dataasset}
    password: ${SPRING_DATASOURCE_PASSWORD:dataasset123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
  
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
  
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:data-asset}

app:
  file:
    upload-path: /opt/data-asset/uploads
    temp-path: /opt/data-asset/temp
  report:
    template-path: /opt/data-asset/templates
    output-path: /opt/data-asset/reports

logging:
  level:
    com.company.dataasset: INFO
  file:
    name: /var/log/data-asset-platform.log
